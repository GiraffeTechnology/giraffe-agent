name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  b-side-tests:
    name: B-side Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Compile Python files
        run: uv run python -m py_compile *.py

      - name: Run B-side and DB tests
        run: uv run pytest tests/db/ -q

  mside-role-switching-tests:
    name: M-side Role-Switching Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Start GLTG mock server
        run: |
          nohup uv run python tests/ci_gltg_server.py 8090 > gltg_server.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8090/health && break; sleep 1; done
          echo "GLTG_API_BASE_URL=http://localhost:8090" >> "$GITHUB_ENV"

      - name: Compile Python files
        run: uv run python -m py_compile *.py

      - name: Run M-side role-switching tests
        run: uv run pytest tests/test_mside_role_switching.py -q

      - name: Run role-switching E2E script
        run: uv run python scripts/run_role_switching_mvp.py

  bm-db-integration:
    name: BM DB Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Start GLTG mock server
        run: |
          nohup uv run python tests/ci_gltg_server.py 8090 > gltg_server.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8090/health && break; sleep 1; done
          echo "GLTG_API_BASE_URL=http://localhost:8090" >> "$GITHUB_ENV"

      - name: Run BM DB integration verifier (DB-off)
        run: GIRAFFE_DB_MODE=off uv run python run_bm_e2e_with_db.py

      - name: Run BM DB integration verifier (DB-on)
        run: |
          GIRAFFE_DB_MODE=on GIRAFFE_DB_URL=sqlite:///./ci_test.db uv run python build_schema.py
          GIRAFFE_DB_MODE=on GIRAFFE_DB_URL=sqlite:///./ci_test.db uv run python run_bm_e2e_with_db.py
          uv run python verify_integration.py --db sqlite:///./ci_test.db --runs 5

  lead-time-model:
    name: Lead Time Path Model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Compile Python files
        run: uv run python -m py_compile *.py

      - name: Start GLTG mock server
        run: |
          nohup uv run python tests/ci_gltg_server.py 8090 > gltg_server.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8090/health && break; sleep 1; done
          echo "GLTG_API_BASE_URL=http://localhost:8090" >> "$GITHUB_ENV"

      - name: Run GLTG-integration lead-time tests
        run: >-
          uv run pytest
          tests/test_gltg_client.py
          tests/test_feasibility_uses_gltg_api.py
          tests/test_b_side_feasibility_uses_lead_time_model.py
          tests/test_m_side_rollup_lead_time_components.py
          -q --tb=short

      - name: Run BM E2E (DB-off) with GLTG-backed lead time
        run: GIRAFFE_DB_MODE=off uv run python run_bm_e2e_with_db.py

      - name: Run role switching tests
        run: uv run pytest tests/test_mside_role_switching.py -q --tb=short

  aivan-clawhub-plugin:
    name: AIVAN ClawHub Plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Start GLTG mock server
        run: |
          nohup uv run python tests/ci_gltg_server.py 8090 > gltg_server.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8090/health && break; sleep 1; done
          echo "GLTG_API_BASE_URL=http://localhost:8090" >> "$GITHUB_ENV"

      - name: Compile Python sources
        run: uv run python -m compileall api/ scripts/ -q

      - name: Unified giraffe-db data-ID contract scan
        run: uv run python scripts/check_unified_data_ids.py --repo .

      - name: Run full pytest suite (includes AIVAN endpoint tests)
        run: uv run pytest -q --tb=short

      - name: Validate ClawHub plugin metadata
        run: uv run python scripts/validate_clawhub_aivan_plugin.py

      - name: Smoke test (mock AIVAN server)
        run: |
          uv run uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          AIVAN_BASE_URL=http://127.0.0.1:8000 uv run python scripts/run_aivan_openclaw_plugin_smoke_test.py
          kill %1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Unicode / BIDI / line-ending check
        run: |
          python - << 'PYEOF'
          import os, re, sys
          BIDI = re.compile('[\u200b-\u200f\u202a-\u202e\u2060-\u2069\ufeff]')
          bad = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('.git', '.venv', '__pycache__', 'node_modules', 'dist')]
              for f in files:
                  if not any(f.endswith(e) for e in ('.py', '.ts', '.md', '.json', '.yml', '.yaml', '.sh')):
                      continue
                  path = os.path.join(root, f)
                  raw = open(path, 'rb').read()
                  issues = []
                  if b'\r\n' in raw:
                      issues.append('CRLF')
                  if raw.startswith(b'\xef\xbb\xbf'):
                      issues.append('BOM')
                  if BIDI.search(raw.decode('utf-8', errors='replace')):
                      issues.append('BIDI')
                  if issues:
                      bad.append(f"{','.join(issues)}: {path}")
          if bad:
              print('\n'.join(bad))
              sys.exit(1)
          print('No encoding issues found.')
          PYEOF

      - name: TypeScript syntax check (plugin bridge)
        working-directory: integrations/openclaw-aivan-plugin
        run: |
          npm install
          npx tsc --version
          npx tsc --noEmit
