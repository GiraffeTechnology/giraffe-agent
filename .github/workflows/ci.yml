name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  b-side-tests:
    name: B-side Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Compile Python files
        run: uv run python -m py_compile *.py

      - name: Run B-side and DB tests
        run: uv run pytest tests/db/ -q

  mside-role-switching-tests:
    name: M-side Role-Switching Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Compile Python files
        run: uv run python -m py_compile *.py

      - name: Run M-side role-switching tests
        run: uv run pytest tests/test_mside_role_switching.py -q

      - name: Run role-switching E2E script
        run: uv run python scripts/run_role_switching_mvp.py

  bm-db-integration:
    name: BM DB Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Run BM DB integration verifier (DB-off)
        run: GIRAFFE_DB_MODE=off uv run python run_bm_e2e_with_db.py

      - name: Run BM DB integration verifier (DB-on)
        run: |
          GIRAFFE_DB_MODE=on GIRAFFE_DB_URL=sqlite:///./ci_test.db uv run python build_schema.py
          GIRAFFE_DB_MODE=on GIRAFFE_DB_URL=sqlite:///./ci_test.db uv run python run_bm_e2e_with_db.py
          uv run python verify_integration.py --db sqlite:///./ci_test.db --runs 5

  lead-time-model:
    name: Lead Time Path Model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Compile Python files
        run: uv run python -m py_compile *.py

      - name: Run lead time model unit tests
        run: uv run pytest tests/test_lead_time_imports.py tests/test_lead_time_model.py tests/test_lead_time_path_enumerator.py tests/test_b_side_feasibility_uses_lead_time_model.py tests/test_m_side_rollup_lead_time_components.py -q --tb=short

      - name: Run lead time model demo
        run: uv run python scripts/run_lead_time_model_demo.py

      - name: Run BM E2E (DB-off) with lead time model
        run: GIRAFFE_DB_MODE=off uv run python run_bm_e2e_with_db.py

      - name: Run role switching tests
        run: uv run pytest tests/test_mside_role_switching.py -q --tb=short
