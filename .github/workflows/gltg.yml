name: GLTG CI

on:
  push:
    paths:
      - "GLTG/**"
  pull_request:
    paths:
      - "GLTG/**"

defaults:
  run:
    working-directory: GLTG

jobs:
  test:
    name: Test GLTG
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Compile check
        run: uv run python -m compileall src tests

      - name: Run tests
        run: uv run pytest --tb=short -q

      - name: Acceptance - 10k shirts
        run: uv run python scripts/run_10000_shirts_acceptance.py

      - name: Acceptance - 0/1/2 supplier cases
        run: uv run python scripts/run_zero_one_two_supplier_cases.py

      - name: Acceptance - 5x reproducibility
        run: uv run python scripts/verify_gltg_5x.py
