name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Add pytest
        run: uv add --dev pytest

      - name: Compile Python files
        run: python -m py_compile *.py

      - name: Run tests
        run: uv run pytest tests/ -q

      - name: Run BM DB integration verifier (DB-off)
        run: GIRAFFE_DB_MODE=off python run_bm_e2e_with_db.py

      - name: Run BM DB integration verifier (DB-on)
        run: |
          GIRAFFE_DB_MODE=on GIRAFFE_DB_URL=sqlite:///./ci_test.db python build_schema.py
          GIRAFFE_DB_MODE=on GIRAFFE_DB_URL=sqlite:///./ci_test.db python run_bm_e2e_with_db.py
          python verify_integration.py --db sqlite:///./ci_test.db --runs 5
